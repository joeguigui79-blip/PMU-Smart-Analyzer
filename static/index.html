<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PMU Smart Analyzer</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/css/style.css?v=7">
</head>
<body>
  <div id="app">

    <!-- ============================
         PAGE: DASHBOARD
         ============================ -->
    <div id="page-dashboard" class="page active">
      <div class="top-header">
        <div class="logo">PMU<span>Smart</span></div>
        <span class="date-badge">—</span>
        <button class="refresh-btn" onclick="doRefresh()" title="Rafraîchir">↺</button>
        <button class="logout-btn" onclick="Auth.logout()" title="Déconnexion">⏻</button>
      </div>
      <div id="dashboard-content">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- ============================
         PAGE: COURSES LIST
         ============================ -->
    <div id="page-courses" class="page">
      <div class="top-header">
        <div class="logo">PMU<span>Smart</span></div>
        <span class="date-badge">—</span>
        <button class="refresh-btn" onclick="doRefresh()">↺</button>
        <button class="logout-btn" onclick="Auth.logout()" title="Déconnexion">⏻</button>
      </div>
      <div id="courses-content">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- ============================
         PAGE: COURSE DETAIL
         ============================ -->
    <div id="page-course" class="page">
      <div class="top-header">
        <button class="back-btn" id="page-course-back-btn" style="display:none">‹</button>
        <span class="header-title" id="course-header-title">Course</span>
        <span class="date-badge">—</span>
      </div>
      <div id="course-content">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- ============================
         PAGE: MES PARIS
         ============================ -->
    <div id="page-bets" class="page">
      <div class="top-header">
        <div class="logo">PMU<span>Smart</span></div>
        <span class="date-badge">—</span>
        <button class="logout-btn" onclick="Auth.logout()" title="Déconnexion">⏻</button>
      </div>
      <div id="bets-content">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- ============================
         PAGE: STATS AVANCÉES
         ============================ -->
    <div id="page-stats" class="page">
      <div class="top-header">
        <div class="logo">PMU<span>Smart</span></div>
        <span class="date-badge">—</span>
        <button class="logout-btn" onclick="Auth.logout()" title="Déconnexion">⏻</button>
      </div>
      <div id="stats-content">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- ============================
         PAGE: BILAN
         ============================ -->
    <div id="page-bilan" class="page">
      <div class="top-header">
        <div class="logo">PMU<span>Smart</span></div>
        <span class="date-badge">—</span>
        <button class="logout-btn" onclick="Auth.logout()" title="Déconnexion">⏻</button>
      </div>
      <div id="bilan-content">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- ============================
         BOTTOM NAVIGATION
         ============================ -->
    <nav class="bottom-nav">
      <div class="nav-item active" data-nav="dashboard">
        <span class="nav-icon">📊<span id="alert-badge" class="nav-badge" style="display:none">0</span></span>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" data-nav="courses">
        <span class="nav-icon">🏇</span>
        <span>Courses</span>
      </div>
      <div class="nav-item" data-nav="bets">
        <span class="nav-icon">🎯</span>
        <span>Mes Paris</span>
      </div>
      <div class="nav-item" data-nav="stats">
        <span class="nav-icon">📈</span>
        <span>Stats</span>
      </div>
      <div class="nav-item" data-nav="bilan">
        <span class="nav-icon">🏆</span>
        <span>Bilan</span>
      </div>
    </nav>

    <!-- ============================
         PARTICIPANT MODAL
         ============================ -->
    <div id="modal-overlay" class="modal-overlay">
      <div class="modal">
        <div id="modal-body"><!-- Filled by JS --></div>
      </div>
    </div>

    <!-- ============================
         TOAST
         ============================ -->
    <div id="toast" class="toast"></div>

    <!-- Pull-to-refresh indicator -->
    <div id="ptr-indicator" class="ptr-indicator">
      <div class="ptr-spinner"></div>
    </div>

  </div><!-- #app -->

  <!-- auth.js MUST be first so Auth is available before api.js and app.js -->
  <script src="/static/js/auth.js?v=1"></script>
  <script src="/static/js/api.js?v=20260509"></script>
  <script src="/static/js/components.js?v=3"></script>
  <script src="/static/js/bets.js?v=3"></script>
  <script src="/static/js/app.js?v=20260509"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // Force unregister old SW then register fresh
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var p = regs.map(function(r) { return r.unregister(); });
        return Promise.all(p);
      }).then(function() {
        return navigator.serviceWorker.register("/sw.js");
      }).then(function (reg) {
        console.log("[PWA] SW enregistré, scope:", reg.scope);
      }).catch(function (err) { console.warn("[PWA] SW échec:", err); });
    }
  </script>
</body>
</html>
